  {"pratique":"Structure formelle de soutien à la pair-aidance","site":"06-OMTL","description":"Structure transversale dans l'établissement de soutien à la pair-aidance pour tous les programmes, incluant un poste de spécialiste en activités cliniques (SAC) pair-aidant chargé de coordonner, encadrer et soutenir les pairs aidants dans leur intégration aux équipes. Cette organisation vise à préserver les spécificités de la pair-aidance : clarifier leur rôle, favoriser leur reconnaissance dans les pratiques cliniques et permettre de mieux intégrer la valeur de l’expérience vécue des jeunes.","theme":"Pair-aidance","intervention":false,"technologie_outil":false,"participation_proches":false,"participation_jeunes":false,"partenariat":false,"promotion_outreach":false,"soutien_equipes":true,"donnees":false,"modalite_acces":false,"pair_aidance":true,"effets_services":false,"sante_physique":false,"accessibilite":false,"besoins":true,"equite":false,"soutenir_proches":false,"pouvoir_agir":true,"confiance":true,"coordination":true,"adaptation_territoriale":false,"doc":"","affiche":"https://projetaire.com/wp-content/uploads/2026/06/06.pdf","recherche":"","guide":"https://espace.enap.ca/id/eprint/529/1/goyette_m_trousse_aire_ouverte2_20240920.pdf"},
  {"pratique":"Intégration d’un médecin de famille","site":"06-OMTL","description":"Collaboration avec un médecin de famille, via un prêt de service directement à Aire ouverte à raison d’une journée par mois, afin d’offrir une porte d’entrée médicale aux jeunes dans un environnement qu’ils fréquentent déjà, plutôt que de les orienter vers des parcours de soins traditionnels auxquels ils n’adhèrent pas toujours. Cette présence favorise la création d’un lien de confiance avec des jeunes vulnérables, notamment ceux réticents à consulter.","theme":"Médecin","intervention":true,"technologie_outil":false,"participation_proches":false,"participation_jeunes":false,"partenariat":false,"promotion_outreach":false,"soutien_equipes":true,"donnees":false,"modalite_acces":true,"pair_aidance":false,"effets_services":false,"sante_physique":true,"accessibilite":true,"besoins":true,"equite":false,"soutenir_proches":false,"pouvoir_agir":false,"confiance":false,"coordination":true,"adaptation_territoriale":false,"doc":"","affiche":"https://projetaire.com/wp-content/uploads/2026/04/Affiches-journee-communaute-apprenante.pdf","recherche":"https://projetaire.com/wp-content/uploads/2026/04/Promouvoir-les-services-integres-pour-les-jeunes_Le-role-des-medecins-de-famille-dans-un-service-urbain-multidisciplinaire.pdf","guide":""},
  {"pratique":"Intégration d’infirmières praticiennes spécialisées (IPS) au sein d’Aire ouverte","site":"06-OMTL","description":"Implication à Aire ouverte d'infirmières praticiennes spécialisées (IPS) pour offrir un suivi clinique plus approfondi auprès de jeunes qui présentent des symptômes, mais qui ne souhaitent pas recourir aux services traditionnels.","theme":"Infirmière practicienne spécialisée","intervention":true,"technologie_outil":false,"participation_proches":false,"participation_jeunes":false,"partenariat":false,"promotion_outreach":false,"soutien_equipes":true,"donnees":false,"modalite_acces":false,"pair_aidance":false,"effets_services":false,"sante_physique":true,"accessibilite":false,"besoins":true,"equite":false,"soutenir_proches":false,"pouvoir_agir":false,"confiance":false,"coordination":true,"adaptation_territoriale":false,"doc":"","affiche":"","recherche":"","guide":""},
  {"pratique":"Dépistage “intégré” à l'intervention psychosociale","site":"06-OMTL","description":"Aire ouverte développe une approche de dépistage où les infirmières intégrées à l’équipe Aire ouverte peuvent offrir des interventions de santé sexuelle directement dans le parcours des jeunes, en complément des interventions psychosociales et de santé mentale. Contrairement aux modèles où le dépistage est offert ponctuellement par des services externes, cette approche permet de répondre aux besoins de santé globale des jeunes au même endroit, notamment lorsque des enjeux de santé sont identifiés au cours d’une intervention.","theme":"Clinique mobile","intervention":true,"technologie_outil":false,"participation_proches":false,"participation_jeunes":false,"partenariat":true,"promotion_outreach":true,"soutien_equipes":false,"donnees":false,"modalite_acces":true,"pair_aidance":false,"effets_services":false,"sante_physique":true,"accessibilite":true,"besoins":true,"equite":false,"soutenir_proches":false,"pouvoir_agir":false,"confiance":false,"coordination":true,"adaptation_territoriale":false,"doc":"","affiche":"","recherche":"https://pubmed.ncbi.nlm.nih.gov/31789096/","guide":""},

// ─── Parseur TSV ──────────────────────────────────────────────────────────────
function parseTSV(text) {
    // Strip BOM si présent (UTF-8 ou UTF-16)
    const cleaned = text.charCodeAt(0) === 0xFEFF ? text.slice(1) : text;
    const lines = cleaned.replace(/\r/g, '').split('\n').filter(l => l.trim());
    const headers = lines[0].split('\t');
    const x = v => (v || '').trim().toUpperCase() === 'X';
    const s = v => (v || '').trim();

    return lines.slice(1).filter(l => l.trim()).map(line => {
        const p = line.split('\t');
        return {
            pratique:               s(p[0]),
            site:                   s(p[1]),
            description:            s(p[2]),
            theme:                  s(p[3]),
            intervention:           x(p[5]),
            technologie_outil:      x(p[6]),
            participation_proches:  x(p[7]),
            participation_jeunes:   x(p[8]),
            partenariat:            x(p[9]),
            promotion_outreach:     x(p[10]),
            donnees:                x(p[11]),
            modalite_acces:         x(p[12]),
            pair_aidance:           x(p[13]),
            effets_services:        x(p[14]),
            sante_physique:         x(p[15]),
            accessibilite:          x(p[16]),
            besoins:                x(p[17]),
            equite:                 x(p[18]),
            soutenir_proches:       x(p[19]),
            pouvoir_agir:           x(p[20]),
            confiance:              x(p[21]),
            coordination:           x(p[22]),
            adaptation_territoriale:x(p[23]),
            doc:                    s(p[24]),
            affiche:                s(p[25]),
            recherche:              s(p[26]),
            guide:                  s(p[27]),
        };
    }).filter(r => r.pratique);
}

function LoginModal({ onClose }) {
    const [email, setEmail]       = useState('');
    const [password, setPassword] = useState('');
    const [error, setError]       = useState('');
    const [loading, setLoading]   = useState(false);

    const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true); setError('');
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { setError(error.message); setLoading(false); return; }
        onClose();
    };

    return (
        <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4 modal-overlay" onClick={onClose}>
            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8 modal-box" onClick={e => e.stopPropagation()}>

                    <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><Icon name="x" size={20}/></button>
                </div>
                <form onSubmit={handleSubmit} className="space-y-4">
                    <div>
                        <label className="text-[0.65rem] font-bold text-slate-400 uppercase tracking-wider block mb-1">Courriel</label>
                        <input type="email" value={email} onChange={e => setEmail(e.target.value)} required autoFocus
                            className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-bleu-royal/30 outline-none text-sm"/>
                    </div>
                    <div>
                        <label className="text-[0.65rem] font-bold text-slate-400 uppercase tracking-wider block mb-1">Mot de passe</label>
                        <input type="password" value={password} onChange={e => setPassword(e.target.value)} required
                            className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-bleu-royal/30 outline-none text-sm"/>
                    </div>
                    {error && <p className="text-red-500 text-xs font-semibold bg-red-50 px-3 py-2 rounded-lg">{error}</p>}
                    <button type="submit" disabled={loading}

                        {loading ? 'Connexion…' : 'Se connecter'}

    );

function SelectAvecAutre({ label, options, value, onChange }) {
    const [isAutre, setIsAutre] = useState(false);
    const inp = "w-full px-3 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-bleu-royal/30 outline-none text-sm";
    const lbl = "text-[0.65rem] font-bold text-slate-400 uppercase tracking-wider block mb-1";

    const handleSelect = (e) => {
        if (e.target.value === '__autre__') {
            setIsAutre(true);
            onChange('');
        } else {
            setIsAutre(false);
            onChange(e.target.value);
        }
    };

    return (
        <div>
            <label className={lbl}>{label}</label>
            <select onChange={handleSelect} value={isAutre ? '__autre__' : value} className={inp}>
                <option value="">— Choisir —</option>
                {options.map(o => <option key={o} value={o}>{o}</option>)}
                <option value="__autre__">Autre…</option>
            </select>
            {isAutre && (
                <input autoFocus value={value} onChange={e => onChange(e.target.value)}
                    className={`${inp} mt-2`} placeholder="Précisez…"/>
            )}
        </div>
    );
}

        setComments(data || []);
    };
    const loadAll = async () => {
        setLoading(true);
        await Promise.all([loadSuggestions(), loadComments()]);
        setLoading(false);
    };
    useEffect(() => { loadAll(); }, []);

    const handleRejectSuggestion = async (id) => { await sb.from("suggestions").update({ statut: "rejetee" }).eq("id", id); loadSuggestions(); };
    const handleApproveSuggestion = async (id) => { await sb.from("suggestions").update({ statut: "approuvee" }).eq("id", id); loadSuggestions(); };
    const handleApproveComment = async (id) => {
        await sb.from("comments").update({ approved: true, approved_at: new Date().toISOString() }).eq("id", id);
        loadComments();
    };
    const handleDeleteComment = async (id) => {
        await sb.from("comments").delete().eq("id", id);
        loadComments();
    };

    const tabClass = (t) => "px-4 py-2 text-xs font-bold rounded-xl transition-all " + (tab === t ? "bg-bleu-royal text-white" : "text-slate-500 hover:bg-slate-100");

    return (
        <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4 modal-overlay" onClick={onClose}>
            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col modal-box" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between px-7 py-5 border-b border-slate-100">
                    <div className="flex gap-2">
                        <button className={tabClass("suggestions")} onClick={() => setTab("suggestions")}>
                            Suggestions {suggestions.length > 0 && <span className="ml-1 bg-corail text-white rounded-full px-1.5 text-[0.6rem]">{suggestions.length}</span>}
                        </button>
                        <button className={tabClass("comments")} onClick={() => setTab("comments")}>
                            Commentaires {comments.length > 0 && <span className="ml-1 bg-corail text-white rounded-full px-1.5 text-[0.6rem]">{comments.length}</span>}
                        </button>
                    </div>
                    <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><Icon name="x" size={20}/></button>
                </div>

                <div className="overflow-y-auto flex-1 px-7 py-6">
                    {loading && <p className="text-center text-slate-400 py-10 animate-pulse">Chargement...</p>}

                    {!loading && tab === "suggestions" && (
                        <div className="space-y-4">
                            {suggestions.length === 0 && <div className="text-center py-16"><p className="text-4xl mb-3">OK</p><p className="text-slate-400 text-sm">Aucune suggestion en attente</p></div>}
                            {suggestions.map(s => (
                                <div key={s.id} className="border border-slate-200 rounded-2xl p-5 space-y-3">
                                    <div className="flex items-start justify-between gap-4">
                                        <div>
                                            <p className="font-bold text-slate-900">{s.pratique}</p>
                                            <p className="text-xs text-slate-400 mt-0.5">
                                                {new Date(s.created_at).toLocaleDateString("fr-CA", { day: "numeric", month: "long", year: "numeric" })}
                                                {s.site && " · " + s.site}{s.theme && " · " + s.theme}
                                            </p>
                                        </div>
                                        <div className="flex gap-2 shrink-0">
                                            <button onClick={() => handleRejectSuggestion(s.id)} className="px-3 py-1.5 rounded-lg border border-red-200 text-red-400 text-xs font-bold hover:border-red-400 transition-colors">Rejeter</button>
                                            <button onClick={() => handleApproveSuggestion(s.id)} className="px-3 py-1.5 rounded-lg bg-bleu-royal text-white text-xs font-bold hover:bg-bleu-nuit transition-colors">Approuver</button>
                                        </div>
                                    </div>
                                    {s.description && <p className="text-sm text-slate-600 leading-relaxed border-t border-slate-100 pt-3">{s.description}</p>}
                                </div>
                            ))}
                        </div>
                    )}

                    {!loading && tab === "comments" && (
                        <div className="space-y-4">
                            {comments.length === 0 && <div className="text-center py-16"><p className="text-4xl mb-3">OK</p><p className="text-slate-400 text-sm">Aucun commentaire en attente</p></div>}
                            {comments.map(c => (
                                <div key={c.id} className="border border-slate-200 rounded-2xl p-5 space-y-3">
                                    <div className="flex items-start justify-between gap-4">
                                        <div>
                                            <p className="font-bold text-slate-900">{c.author_name}
                                                {c.author_email && <span className="font-normal text-slate-400 text-xs ml-2">({c.author_email})</span>}
                                            </p>
                                            <p className="text-xs text-slate-400 mt-0.5">
                                                {new Date(c.created_at).toLocaleDateString("fr-CA", { day: "numeric", month: "long", year: "numeric" })}
                                                <span className="ml-2 font-medium" style={{color:"#0F408F"}}>{(c.practice_key || "").split("|")[0]}</span>
                                            </p>
                                        </div>
                                        <div className="flex gap-2 shrink-0">
                                            <button onClick={() => handleDeleteComment(c.id)} className="px-3 py-1.5 rounded-lg border border-red-200 text-red-400 text-xs font-bold hover:border-red-400 transition-colors">Supprimer</button>
                                            <button onClick={() => handleApproveComment(c.id)} className="px-3 py-1.5 rounded-lg bg-bleu-royal text-white text-xs font-bold hover:bg-bleu-nuit transition-colors">Approuver</button>
                                        </div>
                                    </div>
                                    <p className="text-sm text-slate-600 leading-relaxed border-t border-slate-100 pt-3">{c.comment_text}</p>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            </div>
        </div>
    );
}

// ════════════════════════════════════════════════════════════════════════════
// SECTION COMMENTAIRES
// ════════════════════════════════════════════════════════════════════════════
function CommentsSection({ rowKey, comments, onRefresh }) {
    const [form, setForm] = useState({ author_name: "", author_email: "", comment_text: "" });
    const [status, setStatus] = useState("idle");
    const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
    const inp = "w-full px-3 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-bleu-royal/30 outline-none text-sm";
    const lbl = "text-[0.65rem] font-bold text-slate-400 uppercase tracking-wider block mb-1";

    const handleSubmit = async () => {
        if (!form.author_name.trim() || !form.comment_text.trim()) return;
        setStatus("loading");
        const res = await sbFetch("comments", {
            method: "POST",
            headers: { "Prefer": "return=minimal" },
            body: JSON.stringify({ practice_key: rowKey, ...form }),
        });
        if (res.ok) { setStatus("done"); setForm({ author_name: "", author_email: "", comment_text: "" }); }
        else setStatus("error");
    };

    const [refreshing, setRefreshing] = useState(false);
    const handleRefresh = async () => {
        setRefreshing(true);
        await onRefresh(rowKey);
        setRefreshing(false);
    };

    return (
        <div className="border-t border-glacier/60 pt-4 space-y-4">
            <div className="flex items-center justify-between">
                <h4 className="text-xs font-bold text-slate-500 uppercase tracking-widest">
                    Commentaires {comments.length > 0 && <span className="text-bleu-royal">({comments.length})</span>}
                </h4>
                <button onClick={handleRefresh} disabled={refreshing}
                    className="text-[0.65rem] font-bold text-slate-400 hover:text-bleu-royal transition-colors disabled:opacity-50">
                    {refreshing ? "..." : "↺ Rafraîchir"}
                </button>
            </div>
            {comments.length === 0 && <p className="text-xs text-slate-400 italic">Aucun commentaire pour l'instant.</p>}
            <div className="space-y-3">
                {comments.map(c => (
                    <div key={c.id} className="bg-white rounded-xl p-4 border border-slate-100">
                        <div className="flex items-center justify-between mb-1">
                            <span className="text-xs font-bold text-bleu-nuit">{c.author_name}</span>
                            <span className="text-[0.65rem] text-slate-400">
                                {new Date(c.created_at).toLocaleDateString("fr-CA", { day: "numeric", month: "long", year: "numeric" })}
                            </span>
                        </div>
                        <p className="text-sm text-slate-600 leading-relaxed">{c.comment_text}</p>
                    </div>
                ))}
            </div>
            <div className="bg-white rounded-xl p-4 border border-slate-200 space-y-3">
                <p className="text-xs font-bold text-slate-500">Laisser un commentaire</p>
                {status === "done" ? (
                    <p className="text-sm text-emerald-600 font-semibold">Merci ! Votre commentaire sera affiché après modération.</p>
                ) : (
                    <>
                        <div className="grid grid-cols-2 gap-3">
                            <div>
                                <label className={lbl}>Nom <span className="text-corail">*</span></label>
                                <input value={form.author_name} onChange={e => set("author_name", e.target.value)} className={inp} placeholder="Votre nom"/>
                            </div>
                            <div>
                                <label className={lbl}>Courriel (optionnel)</label>
                                <input type="email" value={form.author_email} onChange={e => set("author_email", e.target.value)} className={inp} placeholder="votre@courriel.ca"/>
                            </div>
                        </div>
                        <div>
                            <label className={lbl}>Commentaire <span className="text-corail">*</span></label>
                            <textarea value={form.comment_text} onChange={e => set("comment_text", e.target.value)}
                                rows={3} className={`${inp} resize-y`} placeholder="Partagez votre experience avec cette pratique…"/>
                        </div>
                        {status === "error" && <p className="text-red-500 text-xs">Une erreur est survenue. Reessayez.</p>}
                        <button onClick={handleSubmit}
                            disabled={status === "loading" || !form.author_name.trim() || !form.comment_text.trim()}
                            className="px-5 py-2 rounded-xl bg-bleu-royal text-white text-xs font-bold hover:bg-bleu-nuit transition-colors disabled:opacity-40">
                            {status === "loading" ? "Envoi…" : "Soumettre"}
                        </button>
                    </>
                )}
            </div>
        </div>
    );
}

                    {item.description && (
                        <p className="text-sm text-slate-700 leading-relaxed border-t border-glacier/60 pt-4">{item.description}</p>

// ════════════════════════════════════════════════════════════════════════════
// APPLICATION PRINCIPALE
// ════════════════════════════════════════════════════════════════════════════
function App() {
    const [allData, setAllData]     = useState([]);
    const [sitesMap, setSitesMap]   = useState({});
    const [likesMap, setLikesMap]         = useState({});
    const [commentsMap, setCommentsMap]   = useState({});
    const [commentsByKey, setCommentsByKey] = useState({});
    const [loading, setLoading]     = useState(true);
    const [searchQuery, setSearchQuery] = useState('');
    const [isSiteDropdownOpen, setIsSiteDropdownOpen] = useState(false);
    const siteDropdownRef = useRef(null);

    const [activeFilters, setActiveFilters] = useState({
        site: new Set(), innovation: new Set(), theme: new Set(),
    });
    const [sortConfig, setSortConfig]       = useState({ key: 'pratique', direction: 'asc' });
    const [expandedRows, setExpandedRows]   = useState(new Set());

    const [user, setUser]                   = useState(null);
    const [showLogin, setShowLogin]         = useState(false);
    const [showSuggest, setShowSuggest]     = useState(false);
    const [showSuggestions, setShowSuggestions] = useState(false);

    const [likedIds, setLikedIds] = useState(() => {
        try { return new Set(JSON.parse(localStorage.getItem('aire_liked') || '[]')); }
        catch { return new Set(); }
    });

    useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

    // Auth
    useEffect(() => {
        sb.auth.getSession().then(({ data }) => setUser(data.session?.user || null));
        const { data: { subscription } } = sb.auth.onAuthStateChange((_, session) => setUser(session?.user || null));
        return () => subscription.unsubscribe();
    }, []);

    // Click outside dropdown
    useEffect(() => {
        const handler = (e) => {
            if (siteDropdownRef.current && !siteDropdownRef.current.contains(e.target))
                setIsSiteDropdownOpen(false);
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
    }, []);

    // Chargement des données
    const loadData = useCallback(async () => {
        setLoading(true);
        try {
            // 1. Pratiques — données intégrées directement
            setAllData(PRATIQUES_DATA);

            // 2. Sites (Supabase)
            const sitesRes  = await sbFetch('sites?select=*');
            const sitesData = await sitesRes.json();
            const map = {};
            (Array.isArray(sitesData) ? sitesData : []).forEach(s => map[s.site] = s);
            setSitesMap(map);

            // 3. Likes (Supabase)
            const likesRes  = await sbFetch('likes?select=*');
            const likesData = await likesRes.json();
            const lmap = {};
            (Array.isArray(likesData) ? likesData : []).forEach(l => lmap[l.pratique_key] = l.count);
            setLikesMap(lmap);

            // 4. Comptage commentaires approuvés
            const { data: cmtData } = await sb.from('comments')
                .select('practice_key')
                .eq('approved', true);
            const cmap = {};
            (cmtData || []).forEach(c => {
                cmap[c.practice_key] = (cmap[c.practice_key] || 0) + 1;
            });
            setCommentsMap(cmap);
        } catch(e) { console.error('Erreur chargement:', e); }
        setLoading(false);
    }, []);

    useEffect(() => { loadData(); }, [loadData]);

    // Like
    const loadCommentsForRow = useCallback(async (rowKey) => {
        const { data } = await sb.from('comments')
            .select('*')
            .eq('practice_key', rowKey)
            .eq('approved', true)
            .order('created_at', { ascending: true });
        const comments = data || [];
        setCommentsByKey(prev => ({ ...prev, [rowKey]: comments }));
        setCommentsMap(prev => ({ ...prev, [rowKey]: comments.length }));
    }, []);

    const handleLike = async (rowKey) => {
        const newLikedIds = new Set(likedIds);
        const wasLiked = likedIds.has(rowKey);
        const newCount = Math.max(0, (likesMap[rowKey] || 0) + (wasLiked ? -1 : 1));
        if (wasLiked) { newLikedIds.delete(rowKey); } else { newLikedIds.add(rowKey); }
        setLikedIds(newLikedIds);
        localStorage.setItem('aire_liked', JSON.stringify(Array.from(newLikedIds)));
        setLikesMap(prev => ({ ...prev, [rowKey]: newCount }));
        await sbFetch('likes', {
            method: 'POST',
            headers: { 'Prefer': 'resolution=merge-duplicates' },
            body: JSON.stringify({ pratique_key: rowKey, count: newCount }),
        });
    };

    // Filtres
    const allSites = useMemo(() =>
        Array.from(new Set(allData.map(d => d.site))).filter(Boolean).sort(),
    [allData]);

    const filteredData = useMemo(() => {
        return allData.filter(item => {
            const q = searchQuery.toLowerCase();
            const siteInfo = sitesMap[item.site] || {};
            const matchesSearch = !q || [item.pratique, item.theme, item.description, item.site,
                siteInfo.nouveau_nom, siteInfo.site_long].some(v => (v || '').toLowerCase().includes(q));
            const matchesSite = activeFilters.site.size === 0 || activeFilters.site.has(item.site);
            const matchesTheme = activeFilters.theme.size === 0 || activeFilters.theme.has(item.theme);
            const matchesInnovation = activeFilters.innovation.size === 0 ||
                Array.from(activeFilters.innovation).every(label => {
                    const field = BOOL_FIELDS.find(f => f.label === label);
                    return field ? item[field.key] === true : false;
                });
            return matchesSearch && matchesSite && matchesTheme && matchesInnovation;
        }).sort((a, b) => {
            if (sortConfig.key === 'likes') return (likesMap[b.pratique] || 0) - (likesMap[a.pratique] || 0);
            if (sortConfig.key === 'site') {
                const aN = (sitesMap[a.site]?.nouveau_nom || a.site).toLowerCase();
                const bN = (sitesMap[b.site]?.nouveau_nom || b.site).toLowerCase();
                return sortConfig.direction === 'asc' ? aN.localeCompare(bN) : bN.localeCompare(aN);
            }
            const aV = String(a[sortConfig.key] || '').toLowerCase();
            const bV = String(b[sortConfig.key] || '').toLowerCase();
            return sortConfig.direction === 'asc' ? aV.localeCompare(bV) : bV.localeCompare(aV);
        });
    }, [allData, searchQuery, activeFilters, sortConfig, sitesMap, likesMap]);

    const toggleFilter = (key, value) => {
        setActiveFilters(prev => {
            const next = new Set(prev[key]);
            if (next.has(value)) next.delete(value); else next.add(value);
            return { ...prev, [key]: next };
        });
    };

    const toggleRow = (rowKey) => {
        const isOpen = expandedRows.has(rowKey);
        setExpandedRows(prev => {
            const next = new Set(prev);
            if (next.has(rowKey)) next.delete(rowKey); else next.add(rowKey);
            return next;
        });
        if (!isOpen) loadCommentsForRow(rowKey);
    };

    const getTagStyle = (f) => {
        const isActive = activeFilters.innovation.has(f.label);
        return isActive
            ? { background: '#0F408F', color: '#fff', borderColor: '#0F408F' }
            : { background: f.bg, color: f.text, borderColor: f.bd };
    };

    const colSpan = 5;

    if (loading) return (
        <div className="h-screen flex items-center justify-center font-display font-bold text-bleu-nuit animate-pulse uppercase tracking-widest text-lg">
            Chargement…
        </div>
    );

    return (
        <div className="min-h-screen flex flex-col">
            {showLogin      && <LoginModal       onClose={() => setShowLogin(false)} />}
            {showSuggest    && <SuggestionModal  onClose={() => setShowSuggest(false)} />}
            {showSuggestions && <SuggestionsPanel onClose={() => setShowSuggestions(false)} />}

            {/* En-tête */}
            <header className="bg-bleu-nuit h-20 sticky top-0 z-50 flex items-center px-6 lg:px-12 shadow-xl border-b border-white/10">
                <div className="flex items-center gap-4 flex-1 min-w-0">
                    <img src="20251006_Aire_Logo_VF_LogoCirculaire_ProjetAire_Blanc.png" alt="Logo AIRE" className="w-12 h-12 object-contain shrink-0"/>
                    <span className="font-display font-bold text-white text-xl md:text-2xl tracking-tight leading-none uppercase truncate">
                        Registre des pratiques inspirantes
                    </span>
                </div>
                <div className="flex items-center gap-2 ml-4 shrink-0">
                    {user ? (
                        <>
                            <button onClick={() => setShowSuggestions(true)}
                                className="flex items-center gap-2 px-3 py-2 bg-corail/20 text-corail text-xs font-bold rounded-xl hover:bg-corail/30 transition-all border border-corail/30">
                                <Icon name="inbox" size={14}/> Suggestions
                            </button>
                            <button onClick={() => sb.auth.signOut()} title="Se déconnecter"
                                className="p-2 text-white/30 hover:text-white/70 transition-colors rounded-lg">
                                <Icon name="log-out" size={16}/>
                            </button>
                        </>
                    ) : (
                        <>
                            <button onClick={() => setShowSuggest(true)}
                                className="flex items-center gap-2 px-4 py-2 bg-white/15 text-white text-xs font-bold rounded-xl hover:bg-white/25 transition-all border border-white/20">
                                <Icon name="lightbulb" size={13}/> Suggérer une pratique
                            </button>
                            <button onClick={() => setShowLogin(true)}
                                className="flex items-center gap-2 px-4 py-2 bg-white/10 text-white/50 text-xs font-bold rounded-xl hover:bg-white/20 hover:text-white transition-all border border-white/10">
                                <Icon name="lock" size={13}/> Admin
                            </button>
                        </>
                    )}
                </div>
            </header>

            {/* Hero / Recherche */}
            <div className="bg-bleu-royal pt-10 pb-12 px-6 lg:px-12">
                <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center gap-6">
                    <div className="flex-1 w-full relative group">
                        <div className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                            <Icon name="search" size={22}/>
                        </div>
                        <input type="text"
                            placeholder="Rechercher une pratique, un site, un mot-clé…"
                            className="w-full pl-14 pr-6 py-4 bg-white rounded-2xl shadow-2xl border-0 focus:ring-4 focus:ring-white/30 text-lg outline-none placeholder-slate-400 font-medium text-slate-800"
                            value={searchQuery} onChange={e => setSearchQuery(e.target.value)}/>
                    </div>
                    <div className="w-full md:w-80 relative" ref={siteDropdownRef}>
                        <button onClick={() => setIsSiteDropdownOpen(!isSiteDropdownOpen)}
                            className="w-full flex items-center justify-between px-6 py-4 bg-white/10 border border-white/20 rounded-2xl text-white font-bold hover:bg-white/20 transition-all shadow-xl">
                            <span className="truncate text-base">
                                {activeFilters.site.size === 0 ? 'Tous les sites' : `${activeFilters.site.size} site(s)`}
                            </span>
                            <Icon name={isSiteDropdownOpen ? 'chevron-up' : 'chevron-down'} size={20}/>
                        </button>
                        {isSiteDropdownOpen && (
                            <div className="absolute z-50 mt-2 w-full bg-white rounded-2xl shadow-2xl border border-slate-200 p-2 custom-dropdown-scroll">
                                {allSites.map(siteCode => {
                                    const info = sitesMap[siteCode];
                                    return (
                                        <label key={siteCode} className="flex items-center gap-3 px-3 py-2 hover:bg-slate-50 rounded-lg cursor-pointer group transition-colors">
                                            <input type="checkbox" className="w-4 h-4 rounded border-slate-300 text-bleu-royal"
                                                checked={activeFilters.site.has(siteCode)}
                                                onChange={() => toggleFilter('site', siteCode)}/>
                                            <div>
                                                <span className="text-[0.75rem] font-bold text-slate-700 group-hover:text-bleu-royal block">
                                                    {info ? info.nouveau_nom : siteCode}
                                                </span>
                                                <span className="text-[0.65rem] text-slate-400">{siteCode}</span>
                                            </div>
                                        </label>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                    <button onClick={() => { setSearchQuery(''); setActiveFilters({ site: new Set(), innovation: new Set(), theme: new Set() }); }}
                        className="text-white/50 hover:text-corail transition-colors uppercase font-bold text-xs border-b border-white/10 hover:border-corail pb-1 whitespace-nowrap">
                        Réinitialiser
                    </button>
                </div>
            </div>

            <main className="flex-1 max-w-[1600px] mx-auto w-full px-6 lg:px-12 py-10">
                <div className="flex items-center justify-between mb-6 px-2">
                    <div className="text-sm font-medium text-slate-500">
                        <span className="text-bleu-royal font-bold text-lg mr-2">{filteredData.length}</span>résultat{filteredData.length !== 1 ? 's' : ''}
                    </div>
                    <div className="flex items-center gap-4">
                        <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Trier par</span>
                        <select className="bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-glacier/30 cursor-pointer shadow-sm"
                            value={sortConfig.key} onChange={e => setSortConfig({ key: e.target.value, direction: 'asc' })}>
                            <option value="pratique">Nom de la pratique</option>
                            <option value="site">Site</option>
                            <option value="theme">Thème</option>
                        </select>
                    </div>
                </div>

                <div className="bg-white rounded-[2rem] shadow-2xl shadow-slate-200/50 border border-slate-200 overflow-hidden">
                    <div className="overflow-x-auto">
                        <table className="w-full text-left border-collapse table-fixed">
                            <thead>
                                <tr className="bg-slate-50/80 border-b border-slate-200">
                                    <th className="px-6 py-5 text-[0.6rem] font-bold text-slate-400 uppercase tracking-widest w-[27%] text-center">Pratique</th>
                                    <th className="px-6 py-5 text-[0.6rem] font-bold text-slate-400 uppercase tracking-widest w-[27%] text-center">Site</th>
                                    <th className="px-6 py-5 text-[0.6rem] font-bold text-slate-400 uppercase tracking-widest w-[16%] text-center">Thème</th>
                                    <th className="px-6 py-5 text-[0.6rem] font-bold text-slate-400 uppercase tracking-widest w-[25%] text-center">Type</th>
                                    <th className="px-4 py-5 w-[5%]"></th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {filteredData.length === 0 && (
                                    <tr><td colSpan={5} className="text-center py-20 text-slate-400 text-sm">Aucun résultat.</td></tr>
                                )}
                                {filteredData.map((item, index) => {
                                    const siteInfo   = sitesMap[item.site] || {};
                                    const rowKey = item.pratique + "|" + item.site;
                                    const isExpanded = expandedRows.has(rowKey);

                                    const hasDetails = !!(item.description || item.doc || item.affiche || item.recherche || item.guide);

                                    return (
                                        <React.Fragment key={index}>
                                            <tr className="hover:bg-slate-50/40 transition-colors group">
                                                <td className="px-8 py-5 align-top">
                                                    <button onClick={() => toggleRow(rowKey)}
                                                        className="text-left text-[0.9rem] font-bold text-slate-900 leading-snug block group-hover:text-bleu-royal transition-colors hover:text-bleu-royal cursor-pointer w-full">
                                                        <span className="block overflow-hidden" style={{display:'-webkit-box', WebkitLineClamp:3, WebkitBoxOrient:'vertical', overflow:'hidden'}}>
                                                            {item.pratique}
                                                        </span>
                                                    </button>
                                                </td>
                                                <td className="px-6 py-5 align-top">
                                                    <span className="text-[0.82rem] font-semibold text-slate-700 leading-snug block overflow-hidden" style={{display:'-webkit-box', WebkitLineClamp:3, WebkitBoxOrient:'vertical', overflow:'hidden'}}>
                                                        {siteInfo.nouveau_nom || item.site}
                                                        {item.site && (
                                                            <span className="text-slate-400 font-normal"> ({item.site})</span>
                                                        )}
                                                    </span>
                                                </td>
                                                <td className="px-6 py-5 align-top">
                                                    {item.theme && (
                                                        <button onClick={() => toggleFilter('theme', item.theme)}
                                                            style={activeFilters.theme.has(item.theme)
                                                                ? { background: '#0F408F', color: '#fff', borderColor: '#0F408F' }
                                                                : { background: '#f8f3ed', color: '#00255B', borderColor: '#ddd0c4' }}
                                                            className="px-2.5 py-1 text-[0.75rem] font-semibold italic rounded-lg border transition-all hover:opacity-80 cursor-pointer">
                                                            {item.theme}
                                                        </button>
                                                    )}
                                                </td>

                                                <td className="px-6 py-5 align-top">
                                                    <div className="flex flex-wrap gap-1.5">
                                                        {BOOL_FIELDS.map(f =>
                                                            item[f.key] && (
                                                                <button key={f.key} onClick={() => toggleFilter('innovation', f.label)}
                                                                    style={getTagStyle(f)}
                                                                    className="px-2 py-0.5 text-[0.68rem] font-bold rounded-lg border transition-all cursor-pointer hover:opacity-80">
                                                                    {f.label}
                                                                </button>
                                                            )
                                                        )}
                                                    </div>
                                                </td>


                                                <td className="px-4 py-5 align-top text-center">
                                                    <button onClick={() => toggleRow(rowKey)}
                                                        style={{ color: isExpanded ? '#0F408F' : '#94a3b8', background: isExpanded ? '#e0eaf9' : 'transparent' }}
                                                        className="p-1.5 rounded-lg transition-all hover:text-bleu-royal text-sm font-bold">
                                                        {isExpanded ? '▲' : '▼'}
                                                    </button>
                                                </td>
                                            </tr>
                                            {isExpanded && hasDetails && (
                                                <DetailRow item={item} colSpan={5} rowKey={rowKey} comments={commentsByKey[rowKey] || []} onRefresh={loadCommentsForRow} />
                                            )}
                                        </React.Fragment>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>

            <footer className="py-12 border-t border-slate-200 mt-10 text-center opacity-30">
                <span className="font-display font-bold text-bleu-nuit text-lg uppercase">Registre des pratiques inspirantes</span>
                <p className="text-[0.6rem] font-bold uppercase tracking-widest mt-2">© {new Date().getFullYear()} AIRE OUVERTE</p>
            </footer>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
