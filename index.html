cueillir des jeunes adultes de plus de 25 ans qui se présentent spontanément à Aire ouverte et qui vivent une situation de vulnérabilité. Cette pratique permet de répondre à un vide de services pour certains jeunes adultes désaffiliés, en misant sur les besoins réels plutôt que sur les seuls critères administratifs.", "theme": "Élargir l'âge", "intervention": false, "technologie_outil": false, "participation_proches": false, "participation_jeunes": false, "partenariat": false, "promotion_outreach": false, "donnees": false, "modalite_acces": true, "pair_aidance": false, "effets_services": false, "sante_physique": false, "accessibilite": true, "besoins": false, "equite": true, "soutenir_proches": false, "pouvoir_agir": false, "confiance": false, "coordination": true, "adaptation_territoriale": true, "doc": "", "affiche": "", "recherche": "", "guide": ""}, {"pratique": "Souper socialisation", "site": "12-CA", "description": "Activité conviviale mise en place pour retisser des liens sociaux entre jeunes vulnérables ayant vu leurs habiletés relationnelles diminuer depuis la pandémie.", "theme": "Intervention ludique", "intervention": true, "technologie_outil": false, "participation_proches": false, "participation_jeunes": false, "partenariat": false, "promotion_outreach": false, "donnees": false, "modalite_acces": true, "pair_aidance": false, "effets_services": false, "sante_physique": false, "accessibilite": false, "besoins": false, "equite": false, "soutenir_proches": false, "pouvoir_agir": true, "confiance": true, "coordination": false, "adaptation_territoriale": false, "doc": "", "affiche": "https://projetaire.com/wp-content/uploads/2026/06/12.pdf", "recherche": "", "guide": ""}, {"pratique": "Réduction du nombre de rencontre", "site": "13-Lav", "description": "Suivis psychosociaux de courte durée, inspirés de l’approche centrée sur les solutions, axés sur un besoin prioritaire plutôt que sur une évaluation globale, avec un cadre clair présenté dès le départ, une estimation précoce du niveau de besoin permettant une référence rapide vers des services à moyen ou long terme si nécessaire, une pause après cinq rencontres pour intégrer les acquis, et une porte ouverte pour un retour sans barrière ni jugement.", "theme": "Approche d'intervention", "intervention": true, "technologie_outil": false, "participation_proches": false, "participation_jeunes": false, "partenariat": false, "promotion_outreach": false, "donnees": false, "modalite_acces": false, "pair_aidance": false, "effets_services": false, "sante_physique": false, "accessibilite": false, "besoins": false, "equite": false, "soutenir_proches": false, "pouvoir_agir": true, "confiance": false, "coordination": true, "adaptation_territoriale": false, "doc": "", "affiche": "", "recherche": "", "guide": ""}, {"pratique": "Ateliers thématiques Aire ouverte", "site": "13-Lav", "description": "Offre de trois ateliers ponctuels d’environ 1h30, portant sur des thèmes sensibles comme les relations amoureuses, les ITSS et la gestion des émotions. Réalisés dans les locaux de partenaires, ces ateliers servent à créer un premier contact avec les jeunes, à faire connaître Aire ouverte et à développer un lien de confiance, tout en s’adaptant aux besoins exprimés par les milieux.", "theme": "Groupes et ateliers pour les jeunes", "intervention": true, "technologie_outil": false, "participation_proches": false, "participation_jeunes": true, "partenariat": true, "promotion_outreach": true, "donnees": false, "modalite_acces": false, "pair_aidance": false, "effets_services": false, "sante_physique": false, "accessibilite": true, "besoins": false, "equite": false, "soutenir_proches": false, "pouvoir_agir": false, "confiance": true, "coordination": false, "adaptation_territoriale": true, "doc": "", "affiche": "", "recherche": "", "guide": ""}, {"pratique": "Station Aire ouverte/Agents de liaison", "site": "13-Lav", "description": "Déploiement de stations Aire ouverte dans des organismes jeunesse partenaires, comme le CJE et un organisme en travail de rue, où un agent de liaison financé par Aire ouverte agit comme relais dans le milieu. Cette présence régulière permet de repérer les jeunes, de créer des liens, de faciliter l’accès aux services et de renforcer la circulation entre Aire ouverte et les partenaires du territoire.", "theme": "Liaison partenaire", "intervention": false, "technologie_outil": false, "participation_proches": false, "participation_jeunes": false, "partenariat": true, "promotion_outreach": true, "donnees": false, "modalite_acces": true, "pair_aidance": false, "effets_services": false, "sante_physique": false, "accessibilite": true, "besoins": false, "equite": false, "soutenir_proches": false, "pouvoir_agir": false, "confiance": true, "coordination": true, "adaptation_territoriale": true, "doc": "", "affiche": "https://projetaire.com/wp-content/uploads/2026/06/02.pdf", "recherche": "", "guide": ""}, {"pratique": "Implication des jeunes sur le terrain", "site": "13-Lav", "description": "Les jeunes du comité d’Aire ouverte Laval s’impliquent sur le terrain comme ambassadeurs en coanimant des kiosques et en échangeant avec leurs pairs, dans un cadre volontaire tout en étant accompagnés. Ils vont notamment participer à la coanimation des ateliers.", "theme": "Participation des jeunes", "intervention": false, "technologie_outil": false, "participation_proches": false, "participation_jeunes": true, "partenariat": false, "promotion_outreach": true, "donnees": false, "modalite_acces": false, "pair_aidance": false, "effets_services": false, "sante_physique": false, "accessibilite": true, "besoins": false, "equite": false, "soutenir_proches": false, "pouvoir_agir": true, "confiance": true, "coordination": false, "adaptation_territoriale": false, "doc": "", "affiche": "", "recherche": "", "guide": "https://espace.enap.ca/id/eprint/531/1/goyette_m_trousse_aire_ouverte4_20240920.pdf"}, {"pratique": "Offre d’ateliers sur mesure en partenariat", "site": "14 - Lan", "description": "Des ateliers abordant des thématiques variées (ITSS, contraception, relations sexuelles, estime de soi, la dépendance, la santé mentale et le développement adolescent) sont offerts par Aire ouverte , notamment chez les partenaires (O.C., CFA, CFP, hébergement, etc.). Ces ateliers sont conçus en réponse au besoin exprimé par le partenaire et coanimés par des membres de l’équipe et parfois par des intervenants partenaires.", "theme": "Groupes et ateliers pour les jeunes", "intervention": true, "technologie_outil": false, "participation_proches": false, "participation_jeunes": true, "partenariat": true, "promotion_outreach": true, "donnees": false, "modalite_acces": false, "pair_aidance": false, "effets_services": false, "sante_physique": false, "accessibilite": true, "besoins": true, "equite": false, "soutenir_proches": false, "pouvoir_agir": false, "confiance": false, "coordination": false, "adaptation_territoriale": false, "doc": "", "affiche": "", "recherche": "", "guide": ""}, {"pratique": "Appel à projet pour financement des O.C. basé sur les besoins régionaux", "site": "14 - Lan", "description": "Un appel à projets annuel permet de financer des projets d’organismes communautaires en lien avec les besoins des jeunes identifiés par la santé publique régionale, avec un comité de sélection comprenant l'équipe clinique, les partenaires et les jeunes du comité.", "theme": "Budget partenariat", "intervention": false, "technologie_outil": false, "participation_proches": false, "participation_jeunes": true, "partenariat": true, "promotion_outreach": false, "donnees": false, "modalite_acces": false, "pair_aidance": false, "effets_services": false, "sante_physique": false, "accessibilite": true, "besoins": true, "equite": false, "soutenir_proches": false, "pouvoir_agir": true, "confiance": false, "coordination": false, "adaptation_territoriale": false, "doc": "", "affiche": "", "recherche": "", "guide": ""}, {"pratique": "Assigner un intervenant spécifique par territoire", "site": "14 - Lan", "description": "Assignation d'un intervenant Aire ouverte  par territoire (nommé localement agent de liaison) qui assure le partenariat avec les organismes locaux, siège à une instance de concertation et centralise toutes les demandes en lien avec les partenaires.", "theme": "Assignation territoriale", "intervention": false, "technologie_outil": false, "participation_proches": false, "participation_jeunes": false, "partenariat": true, "promotion_outreach": true, "donnees": false, "modalite_acces": true, "pair_aidance": false, "effets_services": false, "sante_physique": false, "accessibilite": true, "besoins": false, "equite": false, "soutenir_proches": false, "pouvoir_agir": false, "confiance": false, "coordination": false, "adaptation_territoriale": true, "doc": "", "affiche": "https://projetaire.com/wp-content/uploads/2026/06/10.pdf", "recherche": "", "guide": ""}, {"pratique": "Collaboration avec les autres régions", "site": "14 - Lan", "description": "Les intervenants d’Aire ouverte collaborent interrégionalement pour répondre aux besoins des jeunes en facilitant les références, accompagnant les jeunes transférés et coordonnant certaines références spécialisées via des IPS en santé mentale.", "theme": "Trajectoire", "intervention": false, "technologie_outil": false, "participation_proches": false, "participation_jeunes": false, "partenariat": true, "promotion_outreach": false, "donnees": false, "modalite_acces": false, "pair_aidance": false, "effets_services": false, "sante_physique": false, "accessibilite": false, "besoins": true, "equite": false, "soutenir_proches": false, "pouvoir_agir": false, "confiance": true, "coordination": true, "adaptation_territoriale": false, "doc": "", "affiche": "", "recherche": "", "guide": ""}, {"pratique": "Participation à la foire des organismes", "site": "14 - Lan", "description": "Développement d’un kiosque Aire ouverte pour les foires des organismes locaux, qui présente le service et inclut un atelier pleine conscience.", "theme": "Partenariats clés", "intervention": false, "technologie_outil": false, "participation_proches": false, "participation_jeunes": false, "partenariat": true, "promotion_outreach": true, "donnees": false, "modalite_acces": false, "pair_aidance": false, "effets_services": false, "sante_physique": false, "accessibilite": true, "besoins": false, "equite": false, "soutenir_proches": false, "pouvoir_agir": false, "confiance": false, "coordination": false, "adaptation_territoriale": false, "doc": "", "affiche": "", "recherche": "", "guide": ""}, {"pratique": "Intégration de jeunes dans la promotion", "site": "14 - Lan", "description": "Présence de jeunes aux kiosques et distribution de porte-clés fabriqués par des jeunes membres du comité lors d’activités promotionnelles, contribuant ainsi à l’appropriation et à la créativité.", "theme": "Promotion des services", "intervention": false, "technologie_outil": false, "participation_proches": false, "participation_jeunes": true, "partenariat": false, "promotion_outreach": true, "donnees": false, "modalite_acces": false, "pair_aidance": false, "effets_services": false, "sante_physique": false, "accessibilite": true, "besoins": false, "equite": false, "soutenir_proches": false, "pouvoir_agir": true, "confiance": true, "coordination": false, "adaptation_territoriale": false, "doc": "", "affiche": "", "recherche": "", "guide": "https://espace.enap.ca/id/eprint/531/1/goyette_m_trousse_aire_ouverte4_20240920.pdf"}, {"pratique": "Participation à Ma famille, Ma communauté", "site": "14 - Lan", "description": "Intégration d’Aire ouverte dans le programme Ma famille, Ma communauté du Centre jeunesse, qui vise à impliquer la famille et la communauté dans les décisions concernant le parcours du jeune (sorte d’approche WrapAround ?).", "theme": "Partenariats clés", "intervention": false, "technologie_outil": false, "participation_proches": true, "participation_jeunes": false, "partenariat": true, "promotion_outreach": false, "donnees": false, "modalite_acces": false, "pair_aidance": false, "effets_services": false, "sante_physique": false, "accessibilite": false, "besoins": false, "equite": false, "soutenir_proches": true, "pouvoir_agir": false, "confiance": false, "coordination": true, "adaptation_territoriale": false, "doc": "", "affiche": "", "recherche": "", "guide": "https://espace.enap.ca/id/eprint/531/1/goyette_m_trousse_aire_ouverte4_20240920.pdf"}, {"pratique": "Formation du personnel en lien avec la mission de l’Esprit-Saint", "site": "14 - Lan", "description": "Formation offerte aux intervenants afin de mieux comprendre les réalités vécues par certains jeunes et familles en lien avec la Mission de l’Esprit-Saint. L’atelier, animé par une personne ayant une expérience vécue de ce contexte, vise à outiller l’équipe pour intervenir avec plus de sensibilité, de prudence et de compréhension auprès des jeunes concernés.", "theme": "Adaptation culturelle", "intervention": false, "technologie_outil": false, "participation_proches": false, "participation_jeunes": false, "partenariat": false, "promotion_outreach": false, "donnees": false, "modalite_acces": false, "pair_aidance": false, "effets_services": false, "sante_physique": false, "accessibilite": false, "besoins": true, "equite": false, "soutenir_proches": false, "pouvoir_agir": false, "confiance": true, "coordination": false, "adaptation_territoriale": true, "doc": "", "affiche": "", "recherche": "", "guide": ""}, {"pratique": "Approche centrée sur les solutions et participation au projet de recherche", "site": "14 - Lan", "description": "Participation de l’équipe Aire ouverte à un projet de recherche et à des formations sur l’approche centrée sur les solutions. Cette démarche vise à soutenir le développement des compétences cliniques de l’équipe et à renforcer une posture d’intervention centrée sur les forces.", "theme": "Approche d'intervention", "intervention": true, "technologie_outil": f // ─── Parseur TSV ──────────────────────────────────────────────────────────────
function parseTSV(text) {
    // Strip BOM si présent (UTF-8 ou UTF-16)
    const cleaned = text.charCodeAt(0) === 0xFEFF ? text.slice(1) : text;
    const lines = cleaned.replace(/\r/g, '').split('\n').filter(l => l.trim());
    const headers = lines[0].split('\t');
    const x = v => (v || '').trim().toUpperCase() === 'X';
    const s = v => (v || '').trim();

    return lines.slice(1).filter(l => l.trim()).map(line => {
        const p = line.split('\t');
        return {
            pratique:               s(p[0]),
            site:                   s(p[1]),
            description:            s(p[2]),
            theme:                  s(p[3]),
            intervention:           x(p[5]),
            technologie_outil:      x(p[6]),
            participation_proches:  x(p[7]),
            participation_jeunes:   x(p[8]),
            partenariat:            x(p[9]),
            promotion_outreach:     x(p[10]),
            donnees:                x(p[11]),
            modalite_acces:         x(p[12]),
            pair_aidance:           x(p[13]),
            effets_services:        x(p[14]),
            sante_physique:         x(p[15]),
            accessibilite:          x(p[16]),
            besoins:                x(p[17]),
            equite:                 x(p[18]),
            soutenir_proches:       x(p[19]),
            pouvoir_agir:           x(p[20]),
            confiance:              x(p[21]),
            coordination:           x(p[22]),
            adaptation_territoriale:x(p[23]),
            doc:                    s(p[24]),
            affiche:                s(p[25]),
            recherche:              s(p[26]),
            guide:                  s(p[27]),
        };
    }).filter(r => r.pratique);
}

// MODALE LOGIN
// ════════════════════════════════════════════════════════════════════════════
function LoginModal({ onClose }) {
    const [email, setEmail]       = useState('');
    const [password, setPassword] = useState('');
    const [error, setError]       = useState('');
    const [loading, setLoading]   = useState(false);

    const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true); setError('');
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { setError(error.message); setLoading(false); return; }
        onClose();
    };

    return (
        <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4 modal-overlay" onClick={onClose}>
            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8 modal-box" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-6">
                    <h2 className="font-display font-bold text-bleu-nuit text-xl">Connexion admin</h2>
                    <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><Icon name="x" size={20}/></button>
                </div>
                <form onSubmit={handleSubmit} className="space-y-4">
                    <div>
                        <label className="text-[0.65rem] font-bold text-slate-400 uppercase tracking-wider block mb-1">Courriel</label>
                        <input type="email" value={email} onChange={e => setEmail(e.target.value)} required autoFocus
                            className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-bleu-royal/30 outline-none text-sm"/>
                    </div>
                    <div>
                        <label className="text-[0.65rem] font-bold text-slate-400 uppercase tracking-wider block mb-1">Mot de passe</label>
                        <input type="password" value={password} onChange={e => setPassword(e.target.value)} required
                            className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-bleu-royal/30 outline-none text-sm"/>
                    </div>
                    {error && <p className="text-red-500 text-xs font-semibold bg-red-50 px-3 py-2 rounded-lg">{error}</p>}
                    <button type="submit" disabled={loading}
                        className="w-full bg-bleu-royal text-white font-bold py-3 rounded-xl hover:bg-bleu-nuit transition-colors disabled:opacity-50">
                        {loading ? 'Connexion…' : 'Se connecter'}
                    </button>
                </form>
            </div>
        </div>
    );
}

function SuggestionModal({ onClose }) {
    const [form, setForm] = useState({ pratique: '', site: '', description: '', theme: '' });
    const [status, setStatus] = useState('idle');
    const [err, setErr] = useState('');
    const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

    const handleSubmit = async () => {
        if (!form.pratique.trim()) return;
        setStatus('loading');
        try {
            const res = await fetch(EDGE_FUNCTION_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                },
                body: JSON.stringify(form),
            });
            if (!res.ok) throw new Error(await res.text());
            setStatus('done');
        } catch(e) { setErr(e.message); setStatus('error'); }
    };

    const inp = "w-full px-3 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-bleu-royal/30 outline-none text-sm";
    const lbl = "text-[0.65rem] font-bold text-slate-400 uppercase tracking-wider block mb-1";

    return (
        <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4 modal-overlay" onClick={onClose}>
            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] flex flex-col modal-box" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between px-7 py-5 border-b border-slate-100">
                    <div>
                        <h2 className="font-display font-bold text-bleu-nuit text-lg">Suggérer une pratique</h2>
                        <p className="text-xs text-slate-400 mt-0.5">Votre suggestion sera examinée avant d'être publiée</p>
                    </div>
                    <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><Icon name="x" size={20}/></button>
                </div>
                {status === 'done' ? (
                    <div className="flex flex-col items-center justify-center py-16 px-7 gap-4">
                        <div className="text-5xl">🎉</div>
                        <h3 className="font-display font-bold text-bleu-nuit text-xl">Merci !</h3>
                        <p className="text-sm text-slate-500 text-center">Votre suggestion a été envoyée et sera examinée par notre équipe.</p>
                        <button onClick={onClose} className="mt-2 px-6 py-2.5 bg-bleu-royal text-white rounded-xl font-bold text-sm hover:bg-bleu-nuit transition-colors">Fermer</button>
                    </div>
                ) : (
                    <>
                        <div className="overflow-y-auto px-7 py-6 space-y-4 flex-1">
                            <div>
                                <label className={lbl}>Nom de la pratique <span className="text-corail">*</span></label>
                                <input value={form.pratique} onChange={e => set('pratique', e.target.value)} className={inp} placeholder="Ex : Atelier de zoothérapie"/>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className={lbl}>Site</label>
                                    <input value={form.site} onChange={e => set('site', e.target.value)} className={inp} placeholder="Ex : 01-BSL"/>
                                </div>
                                <div>
                                    <label className={lbl}>Thème</label>
                                    <input value={form.theme} onChange={e => set('theme', e.target.value)} className={inp} placeholder="Ex : Pair-aidance"/>
                                </div>
                            </div>
                            <div>
                                <label className={lbl}>Description</label>
                                <textarea value={form.description} onChange={e => set('description', e.target.value)}
                                    rows={4} className={`${inp} resize-y`} placeholder="Décrivez la pratique en quelques lignes…"/>
                            </div>
                            {status === 'error' && <p className="text-red-500 text-xs font-semibold bg-red-50 px-3 py-2 rounded-lg">{err}</p>}
                        </div>
                        <div className="flex justify-end gap-3 px-7 py-5 border-t border-slate-100">
                            <button onClick={onClose} className="px-5 py-2 rounded-xl border border-slate-200 text-sm font-bold text-slate-600 hover:border-slate-300 transition-colors">Annuler</button>
                            <button onClick={handleSubmit} disabled={status === 'loading' || !form.pratique.trim()}
                                className="px-5 py-2 rounded-xl bg-corail text-white text-sm font-bold hover:opacity-90 transition-opacity disabled:opacity-40">
                                {status === 'loading' ? 'Envoi…' : 'Soumettre'}
                            </button>
                        </div>
                    </>
                )}
            </div>
        </div>
    );
}

                                            {new Date(s.created_at).toLocaleDateString('fr-CA', { day: 'numeric', month: 'long', year: 'numeric' })}
                                            {s.site && ` · ${s.site}`}
                                            {s.theme && ` · ${s.theme}`}
                                        </p>
                                    </div>
                                    <div className="flex gap-2 shrink-0">
                                        <button onClick={() => handleReject(s.id)}
                                            className="px-3 py-1.5 rounded-lg border border-red-200 text-red-400 text-xs font-bold hover:border-red-400 transition-colors">
                                            Rejeter
                                        </button>
                                        <button onClick={() => handleApprove(s.id)}
                                            className="px-3 py-1.5 rounded-lg bg-bleu-royal text-white text-xs font-bold hover:bg-bleu-nuit transition-colors">
                                            Approuver ✓
                                        </button>
                                    </div>
                                </div>
                                {s.description && <p className="text-sm text-slate-600 leading-relaxed border-t border-slate-100 pt-3">{s.description}</p>}
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        </div>
    );
}

// ════════════════════════════════════════════════════════════════════════════
// LIGNE DÉTAIL (tags + description + liens)
// ════════════════════════════════════════════════════════════════════════════
function DetailRow({ item, colSpan }) {
    const links = [
        { key: 'doc',      label: 'Document'  },
        { key: 'affiche',  label: 'Affiche'   },
        { key: 'recherche',label: 'Recherche' },
        { key: 'guide',    label: 'Guide AIRE'},
    ].filter(l => item[l.key]);

    const activeTags = BOOL_FIELDS.filter(f => item[f.key]);

    return (
        <tr className="expanded-row">
            <td colSpan={colSpan} className="px-8 pb-6 pt-0">
                <div className="bg-glacier/30 rounded-2xl p-6 border border-glacier space-y-4">

                    {activeTags.length > 0 && (
                        <div className="flex flex-wrap gap-2">
                            {activeTags.map(f => (
                                <span key={f.key}
                                    style={{ background: f.bg, color: f.text, borderColor: f.bd }}
                                    className="px-2.5 py-1 text-xs font-bold rounded-lg border">
                                    {f.label}
                                </span>
                            ))}
                        </div>
                    )}

                    {item.description && (
                        <p className="text-sm text-slate-700 leading-relaxed border-t border-glacier/60 pt-4">{item.description}</p>
                    )}

                    {links.length > 0 && (
                        <div className="flex flex-wrap gap-3 pt-2 border-t border-glacier/60">
                            {links.map(l => (
                                <a key={l.key} href={item[l.key]} target="_blank" rel="noopener noreferrer"
                                    className="px-4 py-2 bg-white rounded-xl border border-slate-200 text-xs font-bold text-bleu-royal hover:bg-bleu-royal hover:text-white hover:border-bleu-royal transition-all shadow-sm">
                                    📎 {l.label}
                                </a>
                            ))}
                        </div>
                    )}
                </div>
            </td>
        </tr>
    );
}

// ════════════════════════════════════════════════════════════════════════════
// APPLICATION PRINCIPALE
// ════════════════════════════════════════════════════════════════════════════
function App() {
    const [allData, setAllData]     = useState([]);
    const [sitesMap, setSitesMap]   = useState({});
    const [likesMap, setLikesMap]   = useState({});
    const [loading, setLoading]     = useState(true);
    const [searchQuery, setSearchQuery] = useState('');
    const [isSiteDropdownOpen, setIsSiteDropdownOpen] = useState(false);
    const siteDropdownRef = useRef(null);

    const [activeFilters, setActiveFilters] = useState({
        site: new Set(), innovation: new Set(),
    });
    const [sortConfig, setSortConfig]       = useState({ key: 'pratique', direction: 'asc' });
    const [expandedRows, setExpandedRows]   = useState(new Set());

    const [user, setUser]                   = useState(null);
    const [showLogin, setShowLogin]         = useState(false);
    const [showSuggest, setShowSuggest]     = useState(false);
    const [showSuggestions, setShowSuggestions] = useState(false);

    const [likedIds, setLikedIds] = useState(() => {
        try { return new Set(JSON.parse(localStorage.getItem('aire_liked') || '[]')); }
        catch { return new Set(); }
    });

    useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

    // Auth
    useEffect(() => {
        sb.auth.getSession().then(({ data }) => setUser(data.session?.user || null));
        const { data: { subscription } } = sb.auth.onAuthStateChange((_, session) => setUser(session?.user || null));
        return () => subscription.unsubscribe();
    }, []);

    // Click outside dropdown
    useEffect(() => {
        const handler = (e) => {
            if (siteDropdownRef.current && !siteDropdownRef.current.contains(e.target))
                setIsSiteDropdownOpen(false);
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
    }, []);

    // Chargement des données
    const loadData = useCallback(async () => {
        setLoading(true);
        try {
            // 1. Pratiques — données intégrées directement
            setAllData(PRATIQUES_DATA);

            // 2. Sites (Supabase)
            const sitesRes  = await sbFetch('sites?select=*');
            const sitesData = await sitesRes.json();
            const map = {};
            (Array.isArray(sitesData) ? sitesData : []).forEach(s => map[s.site] = s);
            setSitesMap(map);

            // 3. Likes (Supabase)
            const likesRes  = await sbFetch('likes?select=*');
            const likesData = await likesRes.json();
            const lmap = {};
            (Array.isArray(likesData) ? likesData : []).forEach(l => lmap[l.pratique_key] = l.count);
            setLikesMap(lmap);
        } catch(e) { console.error('Erreur chargement:', e); }
        setLoading(false);
    }, []);

    useEffect(() => { loadData(); }, [loadData]);

    // Like
    const handleLike = async (pratique) => {
        const key = pratique.trim();
        if (likedIds.has(key)) return;
        const newLikedIds = new Set(likedIds);
        newLikedIds.add(key);
        setLikedIds(newLikedIds);
        localStorage.setItem('aire_liked', JSON.stringify(Array.from(newLikedIds)));
        const newCount = (likesMap[key] || 0) + 1;
        setLikesMap(prev => ({ ...prev, [key]: newCount }));
        await sbFetch('likes', {
            method: 'POST',
            headers: { 'Prefer': 'resolution=merge-duplicates' },
            body: JSON.stringify({ pratique_key: key, count: newCount }),
        });
    };

    // Filtres
    const allSites = useMemo(() =>
        Array.from(new Set(allData.map(d => d.site))).filter(Boolean).sort(),
    [allData]);

    const filteredData = useMemo(() => {
        return allData.filter(item => {
            const q = searchQuery.toLowerCase();
            const siteInfo = sitesMap[item.site] || {};
            const matchesSearch = !q || [item.pratique, item.theme, item.description, item.site,
                siteInfo.nouveau_nom, siteInfo.site_long].some(v => (v || '').toLowerCase().includes(q));
            const matchesSite = activeFilters.site.size === 0 || activeFilters.site.has(item.site);
            const matchesInnovation = activeFilters.innovation.size === 0 ||
                Array.from(activeFilters.innovation).every(label => {
                    const field = BOOL_FIELDS.find(f => f.label === label);
                    return field ? item[field.key] === true : false;
                });
            return matchesSearch && matchesSite && matchesInnovation;
        }).sort((a, b) => {
            if (sortConfig.key === 'likes') return (likesMap[b.pratique] || 0) - (likesMap[a.pratique] || 0);
            if (sortConfig.key === 'site') {
                const aN = (sitesMap[a.site]?.nouveau_nom || a.site).toLowerCase();
                const bN = (sitesMap[b.site]?.nouveau_nom || b.site).toLowerCase();
                return sortConfig.direction === 'asc' ? aN.localeCompare(bN) : bN.localeCompare(aN);
            }
            const aV = String(a[sortConfig.key] || '').toLowerCase();
            const bV = String(b[sortConfig.key] || '').toLowerCase();
            return sortConfig.direction === 'asc' ? aV.localeCompare(bV) : bV.localeCompare(aV);
        });
    }, [allData, searchQuery, activeFilters, sortConfig, sitesMap, likesMap]);

    const toggleFilter = (key, value) => {
        setActiveFilters(prev => {
            const next = new Set(prev[key]);
            if (next.has(value)) next.delete(value); else next.add(value);
            return { ...prev, [key]: next };
        });
    };

    const toggleRow = (pratique) => {
        setExpandedRows(prev => {
            const next = new Set(prev);
            if (next.has(pratique)) next.delete(pratique); else next.add(pratique);
            return next;
        });
    };

    const getTagStyle = (f) => {
        const isActive = activeFilters.innovation.has(f.label);
        return isActive
            ? { background: '#0F408F', color: '#fff', borderColor: '#0F408F' }
            : { background: f.bg, color: f.text, borderColor: f.bd };
    };

    const colSpan = 5;

    if (loading) return (
        <div className="h-screen flex items-center justify-center font-display font-bold text-bleu-nuit animate-pulse uppercase tracking-widest text-lg">
            Chargement…
        </div>
    );

    return (
        <div className="min-h-screen flex flex-col">
            {showLogin      && <LoginModal       onClose={() => setShowLogin(false)} />}
            {showSuggest    && <SuggestionModal  onClose={() => setShowSuggest(false)} />}
            {showSuggestions && <SuggestionsPanel onClose={() => setShowSuggestions(false)} />}

            {/* En-tête */}
            <header className="bg-bleu-nuit h-20 sticky top-0 z-50 flex items-center px-6 lg:px-12 shadow-xl border-b border-white/10">
                <div className="flex items-center gap-4 flex-1 min-w-0">
                    <img src="20251006_Aire_Logo_VF_LogoCirculaire_ProjetAire_Blanc.png" alt="Logo AIRE" className="w-12 h-12 object-contain shrink-0"/>
                    <span className="font-display font-bold text-white text-xl md:text-2xl tracking-tight leading-none uppercase truncate">
                        Registre des pratiques inspirantes
                    </span>
                </div>
                <div className="flex items-center gap-2 ml-4 shrink-0">
                    {user ? (
                        <>
                            <button onClick={() => setShowSuggestions(true)}
                                className="flex items-center gap-2 px-3 py-2 bg-corail/20 text-corail text-xs font-bold rounded-xl hover:bg-corail/30 transition-all border border-corail/30">
                                <Icon name="inbox" size={14}/> Suggestions
                            </button>
                            <button onClick={() => sb.auth.signOut()} title="Se déconnecter"
                                className="p-2 text-white/30 hover:text-white/70 transition-colors rounded-lg">
                                <Icon name="log-out" size={16}/>
                            </button>
                        </>
                    ) : (
                        <>
                            <button onClick={() => setShowSuggest(true)}
                                className="flex items-center gap-2 px-4 py-2 bg-white/15 text-white text-xs font-bold rounded-xl hover:bg-white/25 transition-all border border-white/20">
                                <Icon name="lightbulb" size={13}/> Suggérer une pratique
                            </button>
                            <button onClick={() => setShowLogin(true)}
                                className="flex items-center gap-2 px-4 py-2 bg-white/10 text-white/50 text-xs font-bold rounded-xl hover:bg-white/20 hover:text-white transition-all border border-white/10">
                                <Icon name="lock" size={13}/> Admin
                            </button>
                        </>
                    )}
                </div>
            </header>

            {/* Hero / Recherche */}
            <div className="bg-bleu-royal pt-10 pb-12 px-6 lg:px-12">
                <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center gap-6">
                    <div className="flex-1 w-full relative group">
                        <div className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                            <Icon name="search" size={22}/>
                        </div>
                        <input type="text"
                            placeholder="Rechercher une pratique, un site, un mot-clé…"
                            className="w-full pl-14 pr-6 py-4 bg-white rounded-2xl shadow-2xl border-0 focus:ring-4 focus:ring-white/30 text-lg outline-none placeholder-slate-400 font-medium text-slate-800"
                            value={searchQuery} onChange={e => setSearchQuery(e.target.value)}/>
                    </div>
                    <div className="w-full md:w-80 relative" ref={siteDropdownRef}>
                        <button onClick={() => setIsSiteDropdownOpen(!isSiteDropdownOpen)}
                            className="w-full flex items-center justify-between px-6 py-4 bg-white/10 border border-white/20 rounded-2xl text-white font-bold hover:bg-white/20 transition-all shadow-xl">
                            <span className="truncate text-base">
                                {activeFilters.site.size === 0 ? 'Tous les sites' : `${activeFilters.site.size} site(s)`}
                            </span>
                            <Icon name={isSiteDropdownOpen ? 'chevron-up' : 'chevron-down'} size={20}/>
                        </button>
                        {isSiteDropdownOpen && (
                            <div className="absolute z-50 mt-2 w-full bg-white rounded-2xl shadow-2xl border border-slate-200 p-2 custom-dropdown-scroll">
                                {allSites.map(siteCode => {
                                    const info = sitesMap[siteCode];
                                    return (
                                        <label key={siteCode} className="flex items-center gap-3 px-3 py-2 hover:bg-slate-50 rounded-lg cursor-pointer group transition-colors">
                                            <input type="checkbox" className="w-4 h-4 rounded border-slate-300 text-bleu-royal"
                                                checked={activeFilters.site.has(siteCode)}
                                                onChange={() => toggleFilter('site', siteCode)}/>
                                            <div>
                                                <span className="text-[0.75rem] font-bold text-slate-700 group-hover:text-bleu-royal block">
                                                    {info ? info.nouveau_nom : siteCode}
                                                </span>
                                                <span className="text-[0.65rem] text-slate-400">{siteCode}</span>
                                            </div>
                                        </label>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                    <button onClick={() => { setSearchQuery(''); setActiveFilters({ site: new Set(), innovation: new Set() }); }}
                        className="text-white/50 hover:text-corail transition-colors uppercase font-bold text-xs border-b border-white/10 hover:border-corail pb-1 whitespace-nowrap">
                        Réinitialiser
                    </button>
                </div>
            </div>

            <main className="flex-1 max-w-[1600px] mx-auto w-full px-6 lg:px-12 py-10">
                <div className="flex items-center justify-between mb-6 px-2">
                    <div className="text-sm font-medium text-slate-500">
                        <span className="text-bleu-royal font-bold text-lg mr-2">{filteredData.length}</span>résultat{filteredData.length !== 1 ? 's' : ''}
                    </div>
                    <div className="flex items-center gap-4">
                        <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Trier par</span>
                        <select className="bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-glacier/30 cursor-pointer shadow-sm"
                            value={sortConfig.key} onChange={e => setSortConfig({ key: e.target.value, direction: 'asc' })}>
                            <option value="pratique">Nom de la pratique</option>
                            <option value="site">Site</option>
                            <option value="theme">Thème</option>
                            <option value="likes">J'aime ❤️</option>
                        </select>
                    </div>
                </div>

                <div className="bg-white rounded-[2rem] shadow-2xl shadow-slate-200/50 border border-slate-200 overflow-hidden">
                    <div className="overflow-x-auto">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="bg-slate-50/80 border-b border-slate-200">
                                    <th className="px-8 py-5 text-[0.6rem] font-bold text-slate-400 uppercase tracking-widest w-[14%]">Pratique</th>
                                    <th className="px-6 py-5 text-[0.6rem] font-bold text-slate-400 uppercase tracking-widest w-[44%]">Site</th>
                                    <th className="px-6 py-5 text-[0.6rem] font-bold text-slate-400 uppercase tracking-widest w-[27%]">Thème</th>
                                    <th className="px-4 py-5 text-[0.6rem] font-bold text-slate-400 uppercase tracking-widest w-[5%] text-center">❤️</th>
                                    <th className="px-4 py-5 w-[5%]"></th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {filteredData.length === 0 && (
                                    <tr><td colSpan={5} className="text-center py-20 text-slate-400 text-sm">Aucun résultat.</td></tr>
                                )}
                                {filteredData.map(item => {
                                    const siteInfo   = sitesMap[item.site] || {};
                                    const isExpanded = expandedRows.has(item.pratique);
                                    const likeCount  = likesMap[item.pratique] || 0;
                                    const isLiked    = likedIds.has(item.pratique);
                                    const hasDetails = !!(item.description || item.doc || item.affiche || item.recherche || item.guide);

                                    return (
                                        <React.Fragment key={item.pratique}>
                                            <tr className="hover:bg-slate-50/40 transition-colors group">
                                                <td className="px-8 py-5 align-top">
                                                    <button onClick={() => toggleRow(item.pratique)}
                                                        className="text-left text-[0.9rem] font-bold text-slate-900 leading-snug block group-hover:text-bleu-royal transition-colors hover:text-bleu-royal cursor-pointer">
                                                        {item.pratique}
                                                    </button>
                                                </td>
                                                <td className="px-6 py-5 align-top">
                                                    <span className="text-[0.82rem] font-semibold text-slate-700 leading-snug">
                                                        {siteInfo.nouveau_nom || item.site}
                                                        {item.site && (
                                                            <span className="text-slate-400 font-normal"> ({item.site})</span>
                                                        )}
                                                    </span>
                                                </td>
                                                <td className="px-6 py-5 align-top text-[0.82rem] text-slate-600 italic">{item.theme}</td>

                                                <td className="px-4 py-5 align-top text-center">
                                                    <button onClick={() => handleLike(item.pratique)} disabled={isLiked}
                                                        className={`flex flex-col items-center gap-0.5 mx-auto transition-all ${isLiked ? 'cursor-default opacity-80' : 'hover:scale-110 active:scale-95'}`}>
                                                        <span className="text-lg">{isLiked ? '❤️' : '🤍'}</span>
                                                        <span className={`text-xs font-bold ${isLiked ? 'text-corail' : 'text-slate-400'}`}>{likeCount}</span>
                                                    </button>
                                                </td>
                                                <td className="px-4 py-5 align-top text-center">
                                                    {hasDetails && (
                                                        <button onClick={() => toggleRow(item.pratique)}
                                                            style={{ color: isExpanded ? '#0F408F' : '#94a3b8', background: isExpanded ? '#e0eaf9' : 'transparent' }}
                                                            className="p-1.5 rounded-lg transition-all hover:text-bleu-royal text-sm font-bold">
                                                            {isExpanded ? '▲' : '▼'}
                                                        </button>
                                                    )}
                                                </td>
                                            </tr>
                                            {isExpanded && hasDetails && (
                                                <DetailRow item={item} colSpan={5} />
                                            )}
                                        </React.Fragment>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>

            <footer className="py-12 border-t border-slate-200 mt-10 text-center opacity-30">
                <span className="font-display font-bold text-bleu-nuit text-lg uppercase">Registre des pratiques inspirantes</span>
                <p className="text-[0.6rem] font-bold uppercase tracking-widest mt-2">© {new Date().getFullYear()} AIRE OUVERTE</p>
            </footer>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
